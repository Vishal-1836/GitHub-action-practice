name: practice-problem-2
env:
  APP_NAME: ram-practice-project
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
jobs:
  test:
    env:
      ENVIRONMENT: ram
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Environment variable level check
        env:
          REGION: centralindia 
        run: |
          echo "The workflow level varible : ${{env.APP_NAME}}"
          echo "The job level varible : ${{env.ENVIRONMENT}}"
          echo "The step level varible : ${{env.REGION}}"
          echo "The step level varible : ${{ github.repository }}"
          echo "The step level varible :${{ github.workflow }}"
          echo "The step level varible :${{ runner.os }}"
          echo "The step level varible :${{ runner.arch }}"
        
    
